<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL TUNNEL VPN - eSIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --app-green: #1e3d2b; 
            --app-light-green: #4caf50; 
            --bg-dark: #0d1117; 
            --card-bg: #161b22; 
            --text-gray: #8b949e;
            --white: #ffffff;
            --border: #30363d;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--white);
            font-family: 'Cairo', 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* البار العلوي */
        .app-bar {
            background-color: var(--app-green);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 1000;
        }

        .menu-toggle {
            background: none; border: none; color: white;
            font-size: 1.3rem; cursor: pointer; padding: 5px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px 12px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }

        /* القائمة الجانبية (الأصلية) */
        .sidebar {
            position: fixed;
            top: 0; right: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100%;
            background-color: #12161d;
            z-index: 1100;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        body.en .sidebar { right: auto; left: calc(-1 * var(--sidebar-width)); }
        body.sidebar-open .sidebar { right: 0; }
        body.en.sidebar-open .sidebar { left: 0; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .sidebar-nav a {
            color: var(--white); text-decoration: none;
            padding: 12px 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.03);
        }
        .sidebar-nav a:hover { background: var(--app-green); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1050; display: none;
        }
        body.sidebar-open .overlay { display: block; }

        /* منطقة المحتوى */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; }

        .esim-card {
            background: #1c2128;
            border-radius: 28px;
            padding: 40px 20px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .esim-card h1 { font-size: 1.5rem; margin-bottom: 15px; }
        .esim-details { font-size: 0.9rem; color: var(--text-gray); margin-bottom: 30px; }
        .esim-details .separator { margin: 0 8px; color: var(--app-light-green); }

        .install-btn {
            background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%);
            color: white; text-decoration: none; font-weight: bold;
            padding: 16px; border-radius: 50px; display: block;
            margin-bottom: 25px; font-size: 1.1rem;
        }

        .divider { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .line { flex: 1; height: 1px; background: var(--border); }
        .or-text { font-size: 0.85rem; color: var(--text-gray); }

        .qr-wrapper {
            background: white; padding: 15px; border-radius: 20px;
            display: inline-block; margin-bottom: 20px;
        }
        .qr-wrapper img { display: block; width: 180px; height: 180px; }
        
        .qr-instruction { font-size: 0.85rem; color: var(--text-gray); }

        footer {
            text-align: center; padding: 20px; color: var(--text-gray);
            font-size: 0.75rem; border-top: 1px solid var(--border);
        }

        body.en { direction: ltr; }
    </style>
</head>
<body class="ar">

    <div class="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--app-light-green);">ASL MENU</span>
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fas fa-home"></i> <span class="nav-home">الرئيسية</span></a>
            <a href="v2uri.html"><i class="fas fa-code"></i> <span class="nav-json">JSON TO URI</span></a>
            <a href="ip.html"><i class="fas fa-globe"></i> <span class="nav-ip">معلومات الـ IP</span></a>
            <a href="privacy.html"><i class="fas fa-user-shield"></i> <span class="nav-privacy">سياسة الخصوصية</span></a>
            <a href="contact.html"><i class="fas fa-envelope"></i> <span class="nav-contact">اتصل بنا</span></a>
        </nav>
    </aside>

    <div class="app-bar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 id="nav-title" style="margin:0; font-size: 1rem;">ASL TUNNEL VPN</h2>
        <button class="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <main class="main-content">
        <div class="container">
            <div class="esim-card">
                <h1 id="esim-title">Install your free ASL eSIM</h1>
                <p class="esim-details" id="esim-desc">
                    15GB Data <span class="separator">•</span> 7-Day Validity <span class="separator">•</span> <a href="#" style="color:#08f; text-decoration:none;">50+ Countries</a>
                </p>
                
                <a href="https://esimsetup.android.com/esim_qrcode_provisioning?carddata=LPA:1$consumer.e-sim.global$VPWAKDZRFPKIQGJUBBGZRNSX" class="install-btn" id="esim-btn-text">Install eSIM</a>
                
                <a href="https://t.me/ASLTUNNEL/1155" class="install-btn" id="esim-btn-text">Config UNLIMITED</a>
                
                <div class="divider">
                    <div class="line"></div>
                    <span class="or-text" id="or-label">أو قم بالمسح</span>
                    <div class="line"></div>
                </div>

                <div class="qr-wrapper">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=LPA:1$consumer.e-sim.global$VPWAKDZRFPKIQGJUBBGZRNSX" alt="QR Code">
                </div>
                
                <p class="qr-instruction" id="qr-label-bottom">Scan the QR Code on eSIM Compatible Device</p>
                
                <a href="https://t.me/ASLTUNNEL" class="install-btn" id="esim-btn-text"> By ASL TUNNEL</a>
            </div>
        </div>
    </main>

    <footer>
        BY MO GROUPE | © 2026 ASL TUNNEL VPN
    </footer>

    <script>
        let currentLang = 'ar';
        const langData = {
            ar: {
                btn: "English", home: "الرئيسية", json: "JSON TO URI", ip: "معلومات الـ IP", 
                privacy: "سياسة الخصوصية", contact: "اتصل بنا", or: "أو قم بالمسح"
            },
            en: {
                btn: "العربية", home: "Home", json: "JSON TO URI", ip: "IP Info", 
                privacy: "Privacy Policy", contact: "Contact Us", or: "OR SCAN"
            }
        };

        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.className = currentLang + (document.body.classList.contains('sidebar-open') ? ' sidebar-open' : '');
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelector('.lang-btn').innerText = langData[currentLang].btn;
            document.querySelector('.nav-home').innerText = langData[currentLang].home;
            document.querySelector('.nav-json').innerText = langData[currentLang].json;
            document.querySelector('.nav-ip').innerText = langData[currentLang].ip;
            document.querySelector('.nav-privacy').innerText = langData[currentLang].privacy;
            document.querySelector('.nav-contact').innerText = langData[currentLang].contact;
            document.getElementById('or-label').innerText = langData[currentLang].or;
        }
    </script>
</body>
</html>
