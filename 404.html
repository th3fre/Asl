<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Asltunnel</title>
    <style>
        :root {
            --app-green: #2d5a3f; 
            --app-light-green: #4caf50; 
            --bg-dark: #0a0a0a; 
            --card-bg: #161b22; 
            --text-gray: #8b949e;
            --white: #ffffff;
            --border: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .error-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 3rem 2rem;
            border-radius: 16px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .error-code {
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 900;
            color: var(--app-light-green);
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 25px auto;
            width: 80%;
        }

        .content-ar { direction: rtl; margin-bottom: 20px; }
        .content-en { direction: ltr; }

        h2 { font-size: 1.5rem; margin: 10px 0; color: var(--white); }
        p { color: var(--text-gray); font-size: 0.95rem; line-height: 1.6; margin: 0; }

        .btn-home {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 35px;
            background-color: var(--app-green);
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid var(--app-light-green);
        }

        .btn-home:hover {
            background-color: var(--app-light-green);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.2);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(76, 175, 80, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--app-light-green);
            font-size: 0.8rem;
            margin-bottom: 15px;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--app-light-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="status-badge">
            <span class="dot"></span>
            <span>404 Connection Error</span>
        </div>
        
        <div class="error-code">404</div>

        <div class="content-ar">
            <h2>الصفحة غير موجودة</h2>
            <p>نعتذر، يبدو أنك سلكت نفقاً خاطئاً. الرابط الذي تحاول الوصول إليه غير متاح حالياً.</p>
        </div>

        <div class="divider"></div>

        <div class="content-en">
            <h2>Page Not Found</h2>
            <p>Sorry, it seems you've taken a wrong tunnel. The link you are looking for is currently unavailable.</p>
        </div>
        
        <a href="/" class="btn-home">العودة للرئيسية / Back to Home</a>
    </div>

</body>
</html>
