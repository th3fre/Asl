<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL Tunnel - Host Checker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --app-green: #1e3d2b; 
            --app-light-green: #4caf50; 
            --bg-dark: #0a0a0a; 
            --card-bg: #1c2128; 
            --border: #30363d; 
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: white; font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        .app-bar { background-color: var(--app-green); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-toggle { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; }

        .sidebar { position: fixed; top: 0; right: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background-color: #12161d; z-index: 1100; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        body.sidebar-open .sidebar { right: 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .sidebar-nav a { color: white; text-decoration: none; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .sidebar-nav a:hover { background: var(--app-green); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1050; display: none; }
        body.sidebar-open .overlay { display: block; }

        .container { max-width: 500px; margin: 30px auto; padding: 0 15px; flex: 1; width: 100%; }
        .main-card { background-color: var(--card-bg); border-radius: 25px; padding: 30px 20px; border: 1px solid var(--border); text-align: center; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #0d1117; color: var(--app-light-green); margin-bottom: 20px; text-align: center; outline: none; font-size: 1rem; }
        .action-btn { background: linear-gradient(180deg, #4caf50, #2e7d32); color: white; border: none; width: 100%; padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 1rem; }
        .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .result-box { margin-top: 30px; display: none; }
        .info-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-align: right; }
        .info-card h3 { color: var(--app-light-green); margin: 0; font-size: 0.75rem; text-transform: uppercase; }
        .info-card p { color: white; margin: 5px 0 0 0; font-size: 0.95rem; font-family: monospace; word-break: break-all; }

        .loader { display: none; margin: 20px auto; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--app-light-green); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer { background-color: #161b22; padding: 20px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--app-light-green);">ASL MENU</span>
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="v2uri.html"><i class="fas fa-code"></i> JSON TO URI</a>
            <a href="ip.html"><i class="fas fa-globe"></i> معلومات الـ IP</a>
        </nav>
    </aside>

    <div class="app-bar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div>ASL TUNNEL - Host Checker</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="container">
        <div class="main-card">
            <h2 style="margin-top: 0; font-size: 1.3rem;">فحص Host السيرفر</h2>
            <input type="text" id="hostInput" placeholder="أدخل الدومين أو الـ IP هنا">
            <button class="action-btn" id="checkBtn" onclick="checkHost()">افحص الآن</button>

            <div id="loader" class="loader"></div>

            <div id="resultBox" class="result-box">
                <div class="info-card"><div><h3>IP Address</h3><p id="res-ip">-</p></div><i class="fas fa-network-wired" style="color: var(--app-light-green);"></i></div>
                <div class="info-card"><div><h3>Country / الدولة</h3><p id="res-country">-</p></div><i class="fas fa-map-marker-alt" style="color: var(--app-light-green);"></i></div>
                <div class="info-card"><div><h3>ISP / المزود</h3><p id="res-isp">-</p></div><i class="fas fa-building" style="color: var(--app-light-green);"></i></div>
            </div>
        </div>
    </div>

    <footer>
        <div style="font-size: 0.8rem; color: #8b949e;">ASL TUNNEL VPN © 2026</div>
    </footer>

    <script>
        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

        async function checkHost() {
            const host = document.getElementById('hostInput').value.trim();
            const resBox = document.getElementById('resultBox');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('checkBtn');

            if (!host) { alert("يرجى إدخال عنوان"); return; }

            loader.style.display = "block";
            resBox.style.display = "none";
            btn.disabled = true;

            try {
                // استخدام AllOrigins كوسيط لجلب البيانات من ip-api بشكل مضمون
                const url = `http://ip-api.com/json/${host}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if (data && data.status === "success") {
                    document.getElementById('res-ip').innerText = data.query;
                    document.getElementById('res-country').innerText = data.country || "غير معروف";
                    document.getElementById('res-isp').innerText = data.isp || "غير معروف";
                    resBox.style.display = "block";
                } else {
                    alert("العنوان غير صحيح أو تعذر جلب البيانات.");
                }
            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الفحص. حاول استخدام IP مباشر.");
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
