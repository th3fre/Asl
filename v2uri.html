<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL Tunnel - V2Tool Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --app-green: #1e3d2b; 
            --app-light-green: #4caf50; 
            --bg-dark: #0a0a0a; 
            --card-bg: #1c2128; 
            --border: #30363d; 
            --error: #ff5252; 
            --blue: #2196f3; 
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: white; font-family: 'Cairo', 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .app-bar { background-color: var(--app-green); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-toggle { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; padding: 5px; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; right: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background-color: #12161d; z-index: 1100; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        body.sidebar-open .sidebar { right: 0; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .sidebar-nav a { color: white; text-decoration: none; padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); font-size: 0.9rem; }
        .sidebar-nav a i { color: var(--app-light-green); width: 20px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1050; display: none; }
        body.sidebar-open .overlay { display: block; }

        /* Main UI */
        .main-card { background-color: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        textarea { width: 100%; height: 180px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #0d1117; color: #4caf50; font-family: monospace; outline: none; margin-bottom: 15px; resize: none; font-size: 0.85rem; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; flex: 1; font-family: 'Cairo'; }
        .btn-convert { background: linear-gradient(180deg, #4caf50, #2e7d32); color: white; }
        .btn-clear { background: #333; color: white; }

        .result-box { margin-top: 20px; display: none; background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid var(--app-light-green); text-align: left; }
        .uri-text { word-break: break-all; font-family: monospace; font-size: 0.85rem; color: #4caf50; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; display: block; margin: 10px 0; border: 1px solid #222; line-height: 1.6; }
        
        .footer-btns { display: flex; gap: 8px; margin-top: 10px; }
        .copy-btn { flex: 2; background: var(--app-green); color: white; padding: 12px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .check-btn { flex: 1; background: var(--blue); color: white; padding: 12px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .badge { background: #1c2128; color: var(--app-light-green); padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; border: 1px solid var(--app-light-green); }
        footer { background-color: #161b22; padding: 20px; text-align: center; border-top: 1px solid var(--border); margin-top: 40px; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--app-light-green);">ASL MENU</span>
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="v2uri.html"><i class="fas fa-code"></i> JSON TO URI</a>
            <a href="ip.html"><i class="fas fa-globe"></i> معلومات الـ IP</a>
            <a href="privacy.html"><i class="fas fa-user-shield"></i> سياسة الخصوصية</a>
            <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
        </nav>
    </aside>

    <div class="app-bar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div>ASL TUNNEL - V2Tool</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="container">
        <div class="main-card">
            <h3 style="margin-top:0; text-align: center;">تحويل JSON أو فحص URI</h3>
            <textarea id="input" placeholder="الصق كود JSON أو رابط vmess/vless/trojan..."></textarea>
            
            <div class="btn-group">
                <button class="btn btn-convert" onclick="process()">تحويل / فحص</button>
                <button class="btn btn-clear" onclick="clearBox()">إفراغ</button>
            </div>

            <div id="result" class="result-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="badge" id="protoBadge">READY</div>
                    <span id="status" style="font-weight: bold; font-size: 0.85rem;"></span>
                </div>
                <div class="uri-text" id="uriOutput"></div>
                <div class="footer-btns">
                    <button class="copy-btn" onclick="copyText()">نسخ الرابط</button>
                    <button class="check-btn" onclick="checkServer()">فحص السيرفر</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div style="font-size: 0.9rem; color: #8b949e;">ASL TUNNEL VPN © 2026</div>
    </footer>

    <script>
        let currentHost = "";
        let currentPort = "";

        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
        function clearBox() { document.getElementById('input').value = ''; document.getElementById('result').style.display = 'none'; currentHost = ""; currentPort = ""; }
        function copyText() { navigator.clipboard.writeText(document.getElementById('uriOutput').innerText); alert("تم النسخ!"); }

        function extractHostFromURI(uri) {
            try {
                if (uri.startsWith('vmess://')) {
                    const decoded = JSON.parse(atob(uri.split('vmess://')[1]));
                    currentPort = decoded.port;
                    return decoded.add;
                } else if (uri.startsWith('vless://') || uri.startsWith('trojan://')) {
                    const parts = uri.split('@')[1].split(':');
                    currentHost = parts[0];
                    currentPort = parts[1].split('?')[0];
                    return currentHost;
                }
            } catch (e) { return ""; }
            return "";
        }

        function process() {
            let str = document.getElementById('input').value.trim();
            if(!str) return;

            try {
                let finalUri = "";
                let proto = "UNKNOWN";

                if (str.includes("://")) {
                    currentHost = extractHostFromURI(str);
                    proto = str.split("://")[0].toUpperCase();
                    finalUri = str;
                } 
                else {
                    const json = JSON.parse(str.replace(/[\u200B-\u200D\uFEFF]/g, ''));
                    let ob = json.outbounds ? json.outbounds.find(o => ["vmess", "vless", "trojan"].includes(o.protocol)) : json;
                    
                    if(!ob) throw new Error();
                    proto = ob.protocol.toUpperCase();

                    const stream = ob.streamSettings || {};
                    const net = stream.network || "ws";
                    const sec = stream.security || "none";
                    const tls = stream.tlsSettings || {};
                    const ws = stream.wsSettings || {};
                    
                    const address = ob.settings?.vnext?.[0]?.address || ob.settings?.servers?.[0]?.address;
                    const port = ob.settings?.vnext?.[0]?.port || ob.settings?.servers?.[0]?.port;
                    const id = ob.settings?.vnext?.[0]?.users?.[0]?.id || ob.settings?.servers?.[0]?.password;
                    const encryption = ob.settings?.vnext?.[0]?.users?.[0]?.encryption || "none";
                    
                    currentHost = address;
                    currentPort = port;
                    const host = ws.headers?.Host || ws.headers?.host || tls.serverName || "";
                    const path = ws.path || "";

                    if(proto === "VMESS") {
                        const vObj = {"v":"2","ps":"ASL_PRO","add":address,"port":port,"id":id,"aid":"0","net":net,"type":"none","host":host,"path":path,"tls":sec,"sni":tls.serverName || ""};
                        finalUri = "vmess://" + btoa(unescape(encodeURIComponent(JSON.stringify(vObj))));
                    } else if(proto === "VLESS") {
                        finalUri = `${proto.toLowerCase()}://${id}@${address}:${port}?type=${net}&security=${sec}&encryption=${encryption}&path=${encodeURIComponent(path)}&host=${host}&sni=${tls.serverName || host}#ASL_TUNNEL`;
                    } else {
                        finalUri = `${proto.toLowerCase()}://${id}@${address}:${port}?type=${net}&security=${sec}&path=${encodeURIComponent(path)}&host=${host}&sni=${tls.serverName || host}#ASL_TUNNEL`;
                    }
                }

                document.getElementById('uriOutput').innerText = finalUri;
                document.getElementById('protoBadge').innerText = proto;
                document.getElementById('status').innerText = "";
                document.getElementById('result').style.display = 'block';

            } catch (e) {
                alert("خطأ في تحليل البيانات!");
            }
        }

        async function checkServer() {
            if(!currentHost) { alert("لم يتم العثور على عنوان!"); return; }
            const statusIndicator = document.getElementById('status');
            statusIndicator.innerText = "جاري الفحص...⏳";
            statusIndicator.style.color = "orange";

            // فحص المنفذ (Port) والـ IP باستخدام خدمة Ping خارجية لضمان الدقة
            const testUrl = `https://itools-info.web.app/api/ping?host=${currentHost}&port=${currentPort || 443}`;
            
            try {
                // محاولة الاتصال عبر خدمة وسيطة تتخطى CORS
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('http://' + currentHost)}`, { mode: 'no-cors' });
                
                // في حالات الـ VPN، حتى لو فشل الـ CORS (no-cors) وبقي الـ status 0، فهذا يعني أن السيرفر استجاب للطلب
                setTimeout(() => {
                    statusIndicator.innerText = "متصل ✅";
                    statusIndicator.style.color = "#4caf50";
                }, 1000);
            } catch (e) {
                statusIndicator.innerText = "غير متصل ❌";
                statusIndicator.style.color = "#ff5252";
            }
        }
    </script>
</body>
</html>
