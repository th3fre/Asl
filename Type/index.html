<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL GEN Core Tool</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .box { background: #161b22; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: #4caf50; border: 1px solid #30363d; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .row { background: #1e3d2b; padding: 10px; margin-top: 10px; border-radius: 6px; border-right: 4px solid #4caf50; }
        .lbl { font-size: 0.75em; color: #8b949e; margin-bottom: 2px; }
        .val { font-family: monospace; font-size: 0.9em; word-break: break-all; }
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 6px; background: #4caf50; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#4caf50; text-align:center; margin-top:0;">ASL GEN Tool</h2>
    <textarea id="in" placeholder="الصق الرابط (vmess / vless)..."></textarea>
    <button onclick="analyze()">تحليل وفحص الحالة</button>

    <div id="out" style="margin-top:20px; display:none;">
        <div class="row"><div class="lbl">Server Type</div><div id="oType" class="val">--</div></div>
        <div class="row"><div class="lbl">Address</div><div id="oAddr" class="val">--</div></div>
        <div class="row"><div class="lbl">Port</div><div id="oPort" class="val">--</div></div>
        <div class="row"><div class="lbl">UUID</div><div id="oUuid" class="val">--</div></div>
        <div class="row"><div class="lbl">Path</div><div id="oPath" class="val">--</div></div>
        <div class="row"><div class="lbl">SNI / Host</div><div id="oSni" class="val">--</div></div>
        <div class="row"><div class="lbl">شركة السيرفر (ISP)</div><div id="oIsp" class="val">--</div></div>
        <div class="row"><div class="lbl">الحالة (Status)</div><div id="oStatus" class="val">--</div></div>
    </div>
</div>

<script>
async function analyze() {
    let raw = document.getElementById('in').value.trim();
    let data = { type: "Normal", add: "--", port: "--", uuid: "--", path: "/", sni: "--" };
    try {
        if (raw.startsWith('vmess://')) {
            let json = JSON.parse(atob(raw.replace('vmess://', '')));
            data.type = json.net === "grpc" ? "GRPC" : (json.tls === "tls" ? "CDN" : "Normal");
            data.add = json.add; data.port = json.port; data.uuid = json.id;
            data.path = json.path || "/"; data.sni = json.sni || json.host || "--";
        } else if (raw.startsWith('vless://')) {
            let url = new URL(raw.replace('vless://', 'http://'));
            data.type = url.searchParams.get("type") === "grpc" ? "GRPC" : "Normal";
            data.add = url.hostname; data.port = url.port || "443"; data.uuid = url.username;
            data.path = url.searchParams.get("path") || "/";
            data.sni = url.searchParams.get("sni") || url.searchParams.get("host") || "--";
        }
        
        document.getElementById('out').style.display = "block";
        document.getElementById('oType').innerText = data.type;
        document.getElementById('oAddr').innerText = data.add;
        document.getElementById('oPort').innerText = data.port;
        document.getElementById('oUuid').innerText = data.uuid;
        document.getElementById('oPath').innerText = data.path;
        document.getElementById('oSni').innerText = data.sni;

        // جلب مزود الخدمة
        fetch(`https://ip-api.com/json/${data.add}?fields=isp`)
            .then(res => res.json())
            .then(json => document.getElementById('oIsp').innerText = json.isp || "غير معروف");

        // فحص الحالة
        document.getElementById('oStatus').innerText = "جاري الفحص...";
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        try {
            await fetch(`https://${data.add}:${data.port}`, { mode: 'no-cors', signal: controller.signal });
            document.getElementById('oStatus').innerText = "شغال (Online)";
        } catch (e) {
            document.getElementById('oStatus').innerText = "متوقف (Offline)";
        }
        clearTimeout(timeoutId);
    } catch(e) { alert("خطأ في تحليل الرابط!"); }
}
</script>
</body>
</html>
