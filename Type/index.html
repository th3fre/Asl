<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ASL GEN Core Tool</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 15px; }
        .box { background: #161b22; padding: 15px; border-radius: 12px; max-width: 500px; margin: auto; border: 1px solid #30363d; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: #4caf50; border: 1px solid #30363d; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .row { background: #1e3d2b; padding: 8px; margin-top: 8px; border-radius: 6px; border-right: 4px solid #4caf50; }
        .lbl { font-size: 0.7em; color: #8b949e; }
        .val { font-family: monospace; font-size: 0.9em; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; background: #4caf50; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#4caf50; text-align:center;">ASL GEN Core Tool</h2>
    <textarea id="in" placeholder="الصق الرابط (vmess / vless / json)..."></textarea>
    <button onclick="analyze()">تحليل البيانات الأساسية</button>

    <div id="out" style="margin-top:20px; display:none;">
        <div class="row"><div class="lbl">Server Type (نوع السيرفر)</div><div id="oType" class="val">--</div></div>
        <div class="row"><div class="lbl">Address (العنوان)</div><div id="oAddr" class="val">--</div></div>
        <div class="row"><div class="lbl">Port (المنفذ)</div><div id="oPort" class="val">--</div></div>
        <div class="row"><div class="lbl">UUID (معرف المستخدم)</div><div id="oUuid" class="val">--</div></div>
        <div class="row"><div class="lbl">Path / ServiceName</div><div id="oPath" class="val">--</div></div>
        <div class="row"><div class="lbl">SNI / Host</div><div id="oSni" class="val">--</div></div>
    </div>
</div>

<script>
function analyze() {
    let raw = document.getElementById('in').value.trim();
    let data = { type: "Normal", add: "--", port: "--", uuid: "--", path: "/", sni: "--" };
    try {
        if (raw.startsWith('vmess://')) {
            let json = JSON.parse(atob(raw.replace('vmess://', '')));
            data.type = json.net === "grpc" ? "GRPC" : (json.tls === "tls" ? "CDN" : "Normal");
            data.add = json.add; data.port = json.port; data.uuid = json.id;
            data.path = json.path || "/"; data.sni = json.sni || json.host || "--";
        } else if (raw.startsWith('vless://')) {
            let url = new URL(raw.replace('vless://', 'http://'));
            data.type = url.searchParams.get("type") === "grpc" ? "GRPC" : "Normal";
            data.add = url.hostname; data.port = url.port || "443"; data.uuid = url.username;
            data.path = url.searchParams.get("path") || "/";
            data.sni = url.searchParams.get("sni") || url.searchParams.get("host") || "--";
        }
        document.getElementById('out').style.display = "block";
        document.getElementById('oType').innerText = data.type;
        document.getElementById('oAddr').innerText = data.add;
        document.getElementById('oPort').innerText = data.port;
        document.getElementById('oUuid').innerText = data.uuid;
        document.getElementById('oPath').innerText = data.path;
        document.getElementById('oSni').innerText = data.sni;
    } catch(e) { alert("خطأ في تحليل الرابط!"); }
}
</script>
</body>
</html>
