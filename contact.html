<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASL Tunnel - Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --app-green: #1e3d2b; 
            --app-light-green: #4caf50; 
            --bg-dark: #0d1117; 
            --card-bg: #161b22; 
            --border: #30363d; 
            --text-gray: #8b949e;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: white; font-family: 'Cairo', 'Poppins', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* البار العلوي */
        .app-bar { background-color: var(--app-green); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-toggle { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; padding: 5px; }
        .lang-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: 'Cairo'; }

        /* القائمة الجانبية */
        .sidebar { position: fixed; top: 0; right: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background-color: #12161d; z-index: 1100; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        body.en .sidebar { right: auto; left: calc(-1 * var(--sidebar-width)); }
        body.sidebar-open .sidebar { right: 0; }
        body.en.sidebar-open .sidebar { left: 0; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .sidebar-nav a { color: white; text-decoration: none; padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); font-size: 0.9rem; }
        .sidebar-nav a:hover { background: var(--app-green); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1050; display: none; }
        body.sidebar-open .overlay { display: block; }

        .container { max-width: 500px; margin: 30px auto; padding: 0 15px; flex: 1; width: 100%; }
        
        .contact-card { background-color: #1c2128; border-radius: 28px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-icon { width: 70px; height: 70px; background: rgba(76, 175, 80, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 1px solid var(--app-light-green); }
        .header-icon i { font-size: 1.8rem; color: var(--app-light-green); }

        .form-group { text-align: inherit; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--app-light-green); margin-bottom: 5px; }
        
        input, textarea { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); 
            background: #0d1117; color: white; outline: none; font-family: inherit; font-size: 0.9rem;
        }
        input:focus, textarea:focus { border-color: var(--app-light-green); }
        
        .send-btn { 
            background: linear-gradient(180deg, #4caf50 0%, #2e7d32 100%); color: white; border: none; 
            width: 100%; padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; 
            font-family: 'Cairo'; margin-top: 10px; font-size: 1rem;
        }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        footer { background-color: #161b22; padding: 20px; text-align: center; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-gray); }

        /* لغات واتجاهات */
        body.en { direction: ltr; }
    </style>
</head>
<body class="ar">

    <div class="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--app-light-green);">ASL MENU</span>
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"><i class="fas fa-home"></i> <span class="nav-home">الرئيسية</span></a>
            <a href="v2uri.html"><i class="fas fa-code"></i> <span class="nav-json">JSON TO URI</span></a>
            <a href="ip.html"><i class="fas fa-globe"></i> <span class="nav-ip">معلومات الـ IP</span></a>
            <a href="privacy.html"><i class="fas fa-user-shield"></i> <span class="nav-privacy">سياسة الخصوصية</span></a>

        </nav>
    </aside>

    <div class="app-bar">
        <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div id="nav-title" style="font-weight: bold; font-size: 0.9rem;">ASL TUNNEL - الدعم الفني</div>
        <button class="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <div class="container">
        <div class="contact-card">
            <div class="header-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h2 id="card-title" style="margin: 0 0 5px; text-align: center; font-size: 1.3rem;">راسلنا عبر تلجرام</h2>
            <p id="card-desc" style="text-align: center; color: var(--text-gray); font-size: 0.85rem; margin-bottom: 25px;">اكتب استفسارك وسيصلنا فوراً في القناة الخاصة بالدعم.</p>

            <form id="tgForm">
                <div class="form-group">
                    <label id="lbl-name">الاسم</label>
                    <input type="text" id="user_name" placeholder="أدخل اسمك" required>
                </div>
                <div class="form-group">
                    <label id="lbl-msg">الرسالة</label>
                    <textarea id="user_msg" rows="4" placeholder="كيف يمكننا مساعدتك؟" required></textarea>
                </div>
                <button type="submit" class="send-btn" id="sendBtn">إرسال عبر تلجرام</button>
            </form>
        </div>
    </div>

    <footer id="footer-text">
        © 2026 ASL TUNNEL VPN | نظام الدعم الفني
    </footer>

    <script>
        let currentLang = 'ar';
        const langData = {
            ar: {
                langBtn: "English",
                navTitle: "ASL TUNNEL - الدعم الفني",
                home: "الرئيسية", json: "JSON TO URI", ip: "معلومات الـ IP", privacy: "سياسة الخصوصية", contact: "اتصل بنا",
                cardTitle: "راسلنا عبر تلجرام",
                cardDesc: "اكتب استفسارك وسيصلنا فوراً في القناة الخاصة بالدعم.",
                lblName: "الاسم", lblMsg: "الرسالة",
                placeholderName: "أدخل اسمك", placeholderMsg: "كيف يمكننا مساعدتك؟",
                btnSend: "إرسال عبر تلجرام", btnSending: "جاري الإرسال...",
                success: "✅ تم إرسال رسالتك بنجاح إلى فريق الدعم.",
                error: "❌ فشل الإرسال، تأكد من الإعدادات.",
                footer: "© 2026 ASL TUNNEL VPN | نظام الدعم الفني"
            },
            en: {
                langBtn: "العربية",
                navTitle: "ASL TUNNEL - Support",
                home: "Home", json: "JSON TO URI", ip: "IP Info", privacy: "Privacy Policy", contact: "Contact Us",
                cardTitle: "Contact via Telegram",
                cardDesc: "Write your inquiry and it will reach our support channel instantly.",
                lblName: "Name", lblMsg: "Message",
                placeholderName: "Enter your name", placeholderMsg: "How can we help you?",
                btnSend: "Send via Telegram", btnSending: "Sending...",
                success: "✅ Your message has been sent successfully.",
                error: "❌ Sending failed, check your settings.",
                footer: "© 2026 ASL TUNNEL VPN | Support System"
            }
        };

        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.className = currentLang + (document.body.classList.contains('sidebar-open') ? ' sidebar-open' : '');
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            const data = langData[currentLang];
            document.querySelector('.lang-btn').innerText = data.langBtn;
            document.getElementById('nav-title').innerText = data.navTitle;
            document.getElementById('card-title').innerText = data.cardTitle;
            document.getElementById('card-desc').innerText = data.cardDesc;
            document.getElementById('lbl-name').innerText = data.lblName;
            document.getElementById('lbl-msg').innerText = data.lblMsg;
            document.getElementById('user_name').placeholder = data.placeholderName;
            document.getElementById('user_msg').placeholder = data.placeholderMsg;
            document.getElementById('sendBtn').innerText = data.btnSend;
            document.getElementById('footer-text').innerText = data.footer;

            document.querySelector('.nav-home').innerText = data.home;
            document.querySelector('.nav-json').innerText = data.json;
            document.querySelector('.nav-ip').innerText = data.ip;
            document.querySelector('.nav-privacy').innerText = data.privacy;
            document.querySelector('.nav-contact').innerText = data.contact;
        }

        const TELEGRAM_TOKEN = '8742836065:AAGseliYQDE72DX6TK2FaP8mR-gIzEQptbc'; 
        const CHAT_ID = '1780904599';

        document.getElementById('tgForm').onsubmit = async function(e) {
            e.preventDefault();
            const data = langData[currentLang];
            const name = document.getElementById('user_name').value;
            const message = document.getElementById('user_msg').value;
            const btn = document.getElementById('sendBtn');

            const text = `🚀 *Support Message*\n\n👤 *Name:* ${name}\n💬 *Message:* ${message}`;

            btn.innerText = data.btnSending;
            btn.disabled = true;

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });

                if (response.ok) {
                    alert(data.success);
                    document.getElementById('tgForm').reset();
                    btn.innerText = data.btnSend;
                } else {
                    throw new Error();
                }
            } catch (err) {
                alert(data.error);
                btn.innerText = data.btnSend;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
